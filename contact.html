<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – Spin The Wheel Game</title>
  <meta name="description" content="Have questions or feedback? Get in touch with Zulfiqar Qasim directly at zulfiqarqasim72@gmail.com or send a direct message." />
  <meta name="author" content="Zulfiqar Qasim" />
  <link rel="canonical" href="https://wheelgame.github.io/contact" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/style.css" />

  <style>
    .contact-section { padding: 60px 0 100px; background: var(--bg2); }
    .contact-wrapper { max-width: 800px; margin: 0 auto; background: #ffffff; padding: 48px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
    .contact-header { text-align: center; margin-bottom: 40px; }
    .contact-header h1 { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 12px; color: var(--dark); }
    .contact-header p { color: var(--text-light); font-size: 1rem; max-width: 500px; margin: 0 auto; line-height: 1.6; }
    
    .contact-info-pill { background: var(--bg3); border: 1px solid var(--border); padding: 14px 24px; border-radius: var(--radius-sm); text-align: center; margin-bottom: 32px; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .contact-info-pill a { color: var(--primary); font-weight: 800; text-decoration: none; font-size: 1.05rem; }
    .contact-info-pill a:hover { text-decoration: underline; }
    .contact-info-pill svg { stroke: var(--primary); }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 700; color: var(--dark); margin-bottom: 8px; font-size: 0.9rem; }
    .form-control { width: 100%; border: 2px solid var(--border); background: var(--bg2); padding: 14px 16px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 0.95rem; color: var(--dark); transition: all 0.25s ease; }
    .form-control:focus { outline: none; border-color: var(--primary); background: #ffffff; box-shadow: 0 0 0 4px rgba(255,107,107,0.1); }
    textarea.form-control { min-height: 140px; resize: vertical; }
    
    .btn-submit { width: 100%; background: var(--primary); color: #ffffff; font-family: var(--font-body); font-weight: 800; font-size: 1.05rem; padding: 14px; border: none; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(255,107,107,0.25); transition: all 0.2s ease; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,107,0.35); }
    @media (max-width: 768px) { .contact-wrapper { padding: 24px; border-radius: var(--radius-sm); } }
  </style>

  
</head>
<body>

  <div id="header-root"></div>

  <main class="contact-section">
    <div class="container">
      <div class="contact-wrapper">
        
        <div class="contact-header">
          <h1>Get In <span class="gradient-text">Touch</span></h1>
          <p>Have an idea for a feature, detected an issue, or want to say hello? Drop a message below!</p>
        </div>

        <div class="contact-info-pill">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span>Direct Contact Email:</span>
          <a href="mailto:zulfiqarqasim72@gmail.com">zulfiqarqasim72@gmail.com</a>
        </div>

        <form action="https://formspree.io/f/your-form-id-here" method="POST" onsubmit="alert('Thank you for reaching out! This message framework is active.');">
          <div class="form-group">
            <label for="name">Your Full Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required />
          </div>
          
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required />
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" class="form-control" placeholder="Feature Suggestion / Feedback" required />
          </div>

          <div class="form-group">
            <label for="message">Message Details</label>
            <textarea id="message" name="message" class="form-control" placeholder="Type your notes or questions here..." required></textarea>
          </div>

          <button type="submit" class="btn-submit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send Secure Message
          </button>
        </form>

      </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="/js/header.js"></script>
  <script src="/js/footer.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
